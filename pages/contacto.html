<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contacto de AmiDog Veterinaria en La Florida, Región Metropolitana.">
  <title>Contacto | AmiDog Veterinaria</title>
  <link rel="stylesheet" href="../styles/main.css">
  <script src="../js/contacto.js" defer></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a href="../index.html" aria-label="Ir al inicio de AmiDog">
          <img class="site-header__logo" src="../assets/img/logo-amidog.png" alt="AmiDog Veterinaria">
        </a>

        <button class="menu-button" type="button" aria-expanded="false" aria-controls="main-nav" aria-label="Abrir menú">
          <span></span>
        </button>

        <nav class="main-nav" id="main-nav" aria-label="Navegación principal">
          <a class="main-nav__link" href="../index.html">Inicio</a>
          <a class="main-nav__link" href="servicios.html">Servicios</a>
          <a class="main-nav__link" href="nosotros.html">Nosotros</a>
          <a class="main-nav__link main-nav__link--active" href="contacto.html" aria-current="page">Contacto</a>
          <a class="main-nav__link" href="pedir-hora.html">Pedir hora</a> 
        </nav>
      </div>
    </header>

    <main class="contact-page">
      <section class="contact-hero" aria-labelledby="contact-title">
        <p class="contact-hero__tag">♡ Haz tu consulta</p>
        <h1 class="contact-hero__title" id="contact-title">Contáctanos <span aria-hidden="true">🐾</span></h1>

        <div class="contact-hero__layout">
          <form class="contact-form" id="contact-form" novalidate>
            <div class="contact-form__group">
              <label for="nombre">Nombre</label>
              <input id="nombre" name="nombre" type="text" autocomplete="name" placeholder="Tu nombre" required minlength="2">
              <p class="contact-form__error" id="nombre-error" aria-live="polite"></p>
            </div>

            <div class="contact-form__group">
              <label for="correo">Correo electrónico</label>
              <input id="correo" name="correo" type="email" autocomplete="email" placeholder="nombre@correo.cl" required>
              <p class="contact-form__error" id="correo-error" aria-live="polite"></p>
            </div>

            <div class="contact-form__group">
              <label for="mensaje">Mensaje</label>
              <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí..." required minlength="10"></textarea>
              <p class="contact-form__error" id="mensaje-error" aria-live="polite"></p>
            </div>

            <button class="contact-form__button" type="submit">Enviar</button>
          </form>

          <div class="contact-list" aria-label="Datos de contacto">
            <a class="contact-list__item" href="https://www.google.com/maps/search/?api=1&query=Sta+Raquel+10815+La+Florida+Chile" target="_blank" rel="noopener noreferrer">
              <span class="contact-list__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 5.4 7 13 7 13s7-7.6 7-13a7 7 0 0 0-7-7Zm0 10.1A3.1 3.1 0 1 1 12 6a3.1 3.1 0 0 1 0 6.1Z"/></svg>
              </span>
              <span class="contact-list__text">Sta Raquel 10815, 8310581 La Florida, Región Metropolitana</span>
            </a>

            <a class="contact-list__item" href="https://wa.me/?text=Hola%20AmiDog%2C%20quiero%20hacer%20una%20consulta." target="_blank" rel="noopener noreferrer">
              <span class="contact-list__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12.1 2a9.8 9.8 0 0 0-8.4 14.9L2.4 22l5.2-1.3A9.9 9.9 0 1 0 12.1 2Zm0 17.8a7.8 7.8 0 0 1-4-1.1l-.3-.2-3.1.8.8-3-.2-.3a7.7 7.7 0 1 1 6.8 3.8Zm4.3-5.8c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.6.1l-.7.9c-.2.2-.3.2-.5.1a6.4 6.4 0 0 1-1.9-1.2 7 7 0 0 1-1.3-1.6c-.1-.2 0-.4.1-.5l.4-.5.2-.4c.1-.2 0-.4 0-.5l-.7-1.7c-.2-.4-.4-.4-.6-.4h-.5c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2.1 3.3 5.2 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.8-.7 2-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.3-.5-.4Z"/></svg>
              </span>
              <span>Whatsapp</span>
            </a>

            <a class="contact-list__item" href="https://www.facebook.com/search/top?q=amidog" target="_blank" rel="noopener noreferrer">
              <span class="contact-list__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M14.3 8.5V6.7c0-.8.5-1 1-1h2.6V2.2L14.3 2c-3.5 0-4.5 2.2-4.5 4.4v2.1H7v4h2.8V22h4.5v-9.5h3.3l.5-4h-3.8Z"/></svg>
              </span>
              <span>Facebook</span>
            </a>

            <a class="contact-list__item" href="https://www.instagram.com/amidog/" target="_blank" rel="noopener noreferrer">
              <span class="contact-list__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M7.2 2h9.6A5.2 5.2 0 0 1 22 7.2v9.6a5.2 5.2 0 0 1-5.2 5.2H7.2A5.2 5.2 0 0 1 2 16.8V7.2A5.2 5.2 0 0 1 7.2 2Zm0 2A3.2 3.2 0 0 0 4 7.2v9.6A3.2 3.2 0 0 0 7.2 20h9.6a3.2 3.2 0 0 0 3.2-3.2V7.2A3.2 3.2 0 0 0 16.8 4H7.2Zm10.1 1.5a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
              </span>
              <span>Instagram</span>
            </a>
          </div>
        </div>

        <span class="decor-star decor-star--top" aria-hidden="true"></span>
        <span class="decor-star decor-star--bottom" aria-hidden="true"></span>
        <img class="contact-cat" src="../assets/img/GatitoAsomado.png" alt="Gato asomándose desde el costado derecho">
      </section>
    </main>

    <footer class="site-footer">
      <span>Sta Raquel 10815, 8310581 La Florida, Región Metropolitana</span>
      <a class="site-footer__social" href="https://www.instagram.com/amidog/" target="_blank" rel="noopener noreferrer" aria-label="Instagram de AmiDog">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4"></circle><circle cx="17.5" cy="6.5" r="1"></circle></svg>
        <span>@Amidog</span>
      </a>
    </footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
