<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | AmiDog Veterinaria</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="../styles/main.css">
</head>

<body class="contacto-page-body">

    <svg class="contacto-svg-sprite" aria-hidden="true">

        <symbol id="contacto-icon-heart" viewBox="0 0 24 24">
            <path d="M12 20.5 4.8 13.8A4.8 4.8 0 0 1 11.5 7l.5.5.5-.5a4.8 4.8 0 0 1 6.7 6.8Z"/>
        </symbol>

        <symbol id="contacto-icon-location" viewBox="0 0 24 24">
            <path d="M12 22s7-6.1 7-13a7 7 0 1 0-14 0c0 6.9 7 13 7 13Z"/>
            <circle cx="12" cy="9" r="2.5"/>
        </symbol>

        <symbol id="contacto-icon-whatsapp" viewBox="0 0 24 24">
            <path d="M20.5 11.5a8.5 8.5 0 0 1-12.6 7.4L3 20.5l1.6-4.7A8.5 8.5 0 1 1 20.5 11.5Z"/>
            <path d="M8.5 7.5c.4-.4.9-.3 1.2.2l1 1.8c.2.4.1.8-.2 1.1l-.7.6c.7 1.5 1.9 2.7 3.4 3.4l.6-.7c.3-.3.7-.4 1.1-.2l1.8 1c.5.3.6.8.2 1.2-.6.8-1.5 1.2-2.5 1.1-4.3-.5-7.7-3.9-8.2-8.2-.1-1 .3-1.9 1.1-2.5Z"/>
        </symbol>

        <symbol id="contacto-icon-facebook" viewBox="0 0 24 24">
            <path d="M14 22v-8h3l.5-3H14V9.2c0-.9.3-1.7 1.8-1.7H18V4.8c-.4-.1-1.7-.2-3-.2-3 0-5 1.8-5 5.2V11H7v3h3v8Z"/>
        </symbol>

        <symbol id="contacto-icon-instagram" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.4" cy="6.6" r="1"/>
        </symbol>

        <symbol id="contacto-icon-paw" viewBox="0 0 64 64">
            <ellipse cx="18" cy="16" rx="7" ry="10"/>
            <ellipse cx="34" cy="11" rx="7" ry="10"/>
            <ellipse cx="49" cy="18" rx="7" ry="10"/>
            <ellipse cx="10" cy="32" rx="7" ry="10"/>
            <path d="M18 45c0-11 8-19 16-19s17 9 17 19c0 9-8 13-17 13S18 54 18 45Z"/>
        </symbol>

    </svg>

    <div class="contacto-site">

        <header class="contacto-header">

            <div class="contacto-header-container">

                <a
                    class="contacto-logo"
                    href="../index.html"
                    aria-label="Ir al inicio"
                >
                    <img
                        src="../assets/img/LogoAmidog.png"
                        alt="AmiDog Veterinaria"
                    >
                </a>

                <button
                    class="contacto-menu-button"
                    type="button"
                    aria-label="Abrir menú"
                    aria-expanded="false"
                    aria-controls="contacto-navigation"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav
                    class="contacto-navigation"
                    id="contacto-navigation"
                >
                    <a href="../index.html">Inicio</a>

                    <a href="../index.html#servicios">
                        Servicios
                    </a>

                    <a href="../index.html#nosotros">
                        Nosotros
                    </a>

                    <a
                        class="contacto-active"
                        href="./contacto.html"
                    >
                        Contacto
                    </a>

                    <a href="../index.html#pedir-hora">
                        Pedir hora
                    </a>
                </nav>

            </div>

        </header>

        <main class="contacto-main">

            <section class="contacto-card">

                <div class="contacto-heading">

                    <div class="contacto-label">

                        <svg aria-hidden="true">
                            <use href="#contacto-icon-heart"></use>
                        </svg>

                        <span>Haz tu consulta</span>

                    </div>

                    <h1 class="contacto-title">

                        Contáctanos

                        <svg
                            class="contacto-title-paw"
                            aria-hidden="true"
                        >
                            <use href="#contacto-icon-paw"></use>
                        </svg>

                    </h1>

                </div>

                <div class="contacto-content">

                    <form
                        class="contacto-form"
                        id="contacto-form"
                    >

                        <div class="contacto-form-group">

                            <label for="contacto-name">
                                Nombre
                            </label>

                            <input
                                type="text"
                                id="contacto-name"
                                name="nombre"
                                placeholder="Tu nombre"
                                autocomplete="name"
                                required
                            >

                        </div>

                        <div class="contacto-form-group">

                            <label for="contacto-email">
                                Correo electrónico
                            </label>

                            <input
                                type="email"
                                id="contacto-email"
                                name="correo"
                                placeholder="nombre@correo.cl"
                                autocomplete="email"
                                required
                            >

                        </div>

                        <div class="contacto-form-group">

                            <label for="contacto-message">
                                Mensaje
                            </label>

                            <textarea
                                id="contacto-message"
                                name="mensaje"
                                placeholder="Escribe tu mensaje aquí..."
                                required
                            ></textarea>

                        </div>

                        <button
                            class="contacto-submit-button"
                            type="submit"
                        >
                            Enviar
                        </button>

                    </form>

                    <div class="contacto-information">

                        <a
                            class="contacto-information-item"
                            href="https://maps.google.com/?q=Sta+Raquel+10815+La+Florida"
                            target="_blank"
                            rel="noopener noreferrer"
                        >

                            <span class="contacto-information-icon">

                                <svg aria-hidden="true">
                                    <use href="#contacto-icon-location"></use>
                                </svg>

                            </span>

                            <span>
                                Sta Raquel 10815, 8310581 La Florida,
                                Región Metropolitana
                            </span>

                        </a>

                        <a
                            class="contacto-information-item"
                            href="https://wa.me/56900000000"
                            target="_blank"
                            rel="noopener noreferrer"
                        >

                            <span class="contacto-information-icon">

                                <svg aria-hidden="true">
                                    <use href="#contacto-icon-whatsapp"></use>
                                </svg>

                            </span>

                            <span>WhatsApp</span>

                        </a>

                        <a
                            class="contacto-information-item"
                            href="https://www.facebook.com/"
                            target="_blank"
                            rel="noopener noreferrer"
                        >

                            <span class="contacto-information-icon">

                                <svg aria-hidden="true">
                                    <use href="#contacto-icon-facebook"></use>
                                </svg>

                            </span>

                            <span>Facebook</span>

                        </a>

                        <a
                            class="contacto-information-item"
                            href="https://www.instagram.com/"
                            target="_blank"
                            rel="noopener noreferrer"
                        >

                            <span class="contacto-information-icon">

                                <svg aria-hidden="true">
                                    <use href="#contacto-icon-instagram"></use>
                                </svg>

                            </span>

                            <span>Instagram</span>

                        </a>

                    </div>

                </div>

                <span class="contacto-sparkle contacto-sparkle-one">
                    ✦
                </span>

                <span class="contacto-sparkle contacto-sparkle-two">
                    ✦
                </span>

                <img
                    class="contacto-cat"
                    src="../assets/img/GatitoAsomado.png"
                    alt="Gato asomándose desde un costado"
                >

            </section>

        </main>

        <footer class="contacto-footer">

            <p>
                Sta Raquel 10815, 8310581 La Florida,
                Región Metropolitana
            </p>

            <a
                href="https://www.instagram.com/"
                target="_blank"
                rel="noopener noreferrer"
            >

                <svg aria-hidden="true">
                    <use href="#contacto-icon-instagram"></use>
                </svg>

                <span>@AmiDog</span>

            </a>

        </footer>

    </div>

    <div
        class="contacto-form-message"
        id="contacto-form-message"
        role="status"
        aria-live="polite"
    >
        Tu mensaje fue enviado correctamente.
    </div>

    <script src="../js/contacto.js"></script>

</body>
</html>
